<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShamCash API - إضافة محفظة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: #f1f5f9; }
        .card { background-color: #111111; border: 1px solid #1f1f1f; }
        .accent { color: #22c55e; }
        .bg-accent { background-color: #22c55e; }
        .input-field { background-color: #1a1a1a; border: 1px solid #1f1f1f; color: #f1f5f9; }
        .transition-all { transition: all 0.3s ease; }
        #qrcode img { margin: 0 auto; padding: 10px; background: white; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <a href="/dashboard.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5M12 19l-7-7 7-7" /></svg>
                <span>العودة</span>
            </a>
            <h1 class="text-xl font-bold">إضافة محفظة</h1>
        </div>

        <!-- Step 1: Provider Selection -->
        <div id="step1" class="space-y-4">
            <h2 class="text-lg font-bold mb-4">اختر مزود الخدمة</h2>
            <button onclick="goToStep2('shamcash')" class="card w-full p-6 rounded-3xl flex items-center justify-between hover:border-green-500/50 transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-green-500/10 rounded-2xl flex items-center justify-center accent">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-lg">شام كاش (ShamCash)</div>
                        <div class="text-sm text-slate-500">الربط المباشر عبر رمز الاستجابة السريع</div>
                    </div>
                </div>
                <div class="text-slate-700 group-hover:text-green-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </div>
            </button>
        </div>

        <!-- Step 2: QR Generation & Polling -->
        <div id="step2" class="hidden">
            <div class="card p-8 rounded-3xl text-center space-y-6">
                <div id="loadingQR" class="py-12 flex flex-col items-center justify-center gap-4">
                    <div class="animate-spin w-12 h-12 border-4 border-accent border-t-transparent rounded-full"></div>
                    <p class="text-slate-400">جاري إنشاء جلسة ربط آمنة...</p>
                </div>

                <div id="qrContent" class="hidden space-y-6">
                    <h3 class="font-bold text-xl">امسح الكود للربط</h3>
                    <div id="qrcode" class="flex justify-center"></div>
                    
                    <div class="p-4 bg-gray-900/50 rounded-2xl border border-gray-800">
                        <p class="text-sm text-slate-300">افتح تطبيق <span class="accent font-bold">شام كاش</span>، اختر "مسح QR" من القائمة الرئيسية، وامسح الكود أعلاه.</p>
                    </div>

                    <div class="flex items-center justify-center gap-2 text-sm">
                        <div id="timerSpinner" class="animate-spin w-4 h-4 border-2 border-accent border-t-transparent rounded-full"></div>
                        <span id="expiryLabel" class="text-slate-400">تنتهي الصلاحية خلال: </span>
                        <span id="countdown" class="font-mono font-bold accent">00:00</span>
                    </div>
                </div>

                <div id="errorView" class="hidden space-y-6 py-6">
                    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center text-red-500 mx-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </div>
                    <h3 id="errorMessage" class="font-bold text-xl">فشلت العملية</h3>
                    <button onclick="window.location.reload()" class="w-full py-3 bg-white text-black font-bold rounded-xl transition-all">إعادة المحاولة</button>
                </div>

                <div id="successView" class="hidden space-y-6 py-6">
                    <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center text-green-500 mx-auto animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                    </div>
                    <h3 class="font-bold text-xl">تم الربط بنجاح!</h3>
                    <p class="text-slate-400">جاري توجيهك إلى لوحة التحكم...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        let sessionPolling = null;
        let countdownInterval = null;

        async function goToStep2(provider) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            try {
                const res = await fetch('/api/sessions/create', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ provider })
                });
                const data = await res.json();

                if (data.success) {
                    initSession(data.session);
                } else {
                    showError(data.message || 'فشل إنشاء الجلسة');
                }
            } catch (err) {
                showError('خطأ في الاتصال بالسيرفر');
            }
        }

        function initSession(session) {
            document.getElementById('loadingQR').classList.add('hidden');
            document.getElementById('qrContent').classList.remove('hidden');

            // Render QR
            new QRCode(document.getElementById("qrcode"), {
                text: session.qrPayload,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Start Countdown
            const expiry = new Date(session.expiresAt).getTime();
            startCountdown(expiry);

            // Start Polling
            startPolling(session.id);
        }

        function startCountdown(expiry) {
            function update() {
                const now = new Date().getTime();
                const diff = expiry - now;

                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    showError('انتهت صلاحية رمز الاستجابة السريع');
                    return;
                }

                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            update();
            countdownInterval = setInterval(update, 1000);
        }

        function startPolling(sessionId) {
            sessionPolling = setInterval(async () => {
                try {
                    const res = await fetch(`/api/sessions/${sessionId}/status`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();

                    if (data.status === 'linked') {
                        clearInterval(sessionPolling);
                        clearInterval(countdownInterval);
                        showSuccess();
                    } else if (data.status === 'expired' || data.status === 'failed') {
                        clearInterval(sessionPolling);
                        clearInterval(countdownInterval);
                        showError('فشلت الجلية أو انتهت صلاحيتها');
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 3000);
        }

        function showError(msg) {
            document.getElementById('loadingQR').classList.add('hidden');
            document.getElementById('qrContent').classList.add('hidden');
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorView').classList.remove('hidden');
            if (sessionPolling) clearInterval(sessionPolling);
            if (countdownInterval) clearInterval(countdownInterval);
        }

        function showSuccess() {
            document.getElementById('qrContent').classList.add('hidden');
            document.getElementById('successView').classList.remove('hidden');
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 2500);
        }
    </script>
</body>
</html>
